<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スペシャルクエスト - 推し本を報告せよ！</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    
    <style>
        /* --- カラーと基本設定 --- */
        :root {
            --bg-special-start: #2c3e50; /* 特別感を出す少し暗めの夜空色 */
            --bg-special-end: #4ca1af;
            --border-color: #212121;
            --gold: #fbc02d;
            --gold-light: #fff59d;
            --text-light: #f5f5f5;
        }
        
        body {
            font-family: 'DotGothic16', sans-serif;
            margin: 0; 
            padding: 0; 
            line-height: 1.6;
            background: linear-gradient(135deg, var(--bg-special-start), var(--bg-special-end));
            color: var(--border-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- メインコンテナ --- */
        .special-container {
            background-color: rgba(255, 255, 255, 0.95);
            border: 6px solid var(--border-color);
            border-radius: 12px;
            padding: 30px 20px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.3);
            position: relative;
        }

        /* --- タイトル部分 --- */
        .quest-badge {
            display: inline-block;
            background-color: var(--gold);
            color: #fff;
            padding: 5px 15px;
            border: 3px solid var(--border-color);
            border-radius: 20px;
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }

        h1 {
            color: #e65100;
            font-size: 2rem;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 0 var(--gold-light);
        }

        /* --- クエスト依頼文（巻物風） --- */
        .quest-scroll {
            background-color: #fffde7;
            border: 4px dashed var(--gold);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            text-align: left;
        }
        .quest-scroll p { margin: 10px 0; }

        /* --- アクションボタン --- */
        .submit-btn {
            display: inline-block;
            font-family: inherit;
            font-size: 1.4rem;
            font-weight: bold;
            text-decoration: none;
            padding: 15px 30px;
            background-color: #ff9800;
            color: white;
            border: 4px solid var(--border-color);
            border-radius: 50px;
            box-shadow: 6px 6px 0 var(--border-color);
            transition: all 0.1s;
            animation: pulseGold 2s infinite; /* キラキラ光るアニメーション */
            margin-bottom: 20px;
            width: 80%;
            box-sizing: border-box;
        }

        .submit-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0 var(--border-color);
            animation: none;
        }

        @keyframes pulseGold {
            0% { box-shadow: 0 0 0 0 rgba(251, 192, 45, 0.7), 6px 6px 0 var(--border-color); }
            70% { box-shadow: 0 0 0 15px rgba(251, 192, 45, 0), 6px 6px 0 var(--border-color); }
            100% { box-shadow: 0 0 0 0 rgba(251, 192, 45, 0), 6px 6px 0 var(--border-color); }
        }

        /* --- 戻るボタン --- */
        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: #555;
            font-size: 1.1rem;
            border-bottom: 2px dashed #555;
            margin-top: 10px;
            transition: color 0.2s;
        }
        .back-btn:hover { color: #000; border-color: #000; }
        
    </style>
</head>
<body>

    <div class="special-container">
        <div class="quest-badge">夏休み限定</div>
        <h1>スペシャルクエスト<br>〜 みんなの「推し本」を 報告せよ！ 〜</h1>
        
        <div class="quest-scroll">
            <p>夏休みクエストに挑戦しているみんなに特別クエスト！</p>
            <p>きみが これまでに出会った、とっておきの<strong><br>「推し本（お気に入りの本）」</strong>を  おしえてほしい。</p>
            <p>みんなが、教えてくれた推し本も紹介しているぞ！</p>
        </div>

        <a href="ここに投稿フォームのURLを入れる" target="_blank" rel="noopener noreferrer" class="submit-btn">
             推し本（お気に入りの本）を報告する！
        </a>

        <a href="book/index.html" target="_blank" rel="noopener noreferrer" class="submit-btn">
             みんなの推し本を見てみる！
        </a>
        
        <a href="index.html" class="back-btn">🔙 もとの ぼうけんに もどる</a>
    </div>

</body>
</html>
